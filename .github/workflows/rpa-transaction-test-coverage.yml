name: RPA Transaction Test Coverage

on:
  pull_request:
    paths:
      - 'src/config/pipelineStages.ts'
      - 'src/config/__tests__/**'
      - 'packages/core/src/transaction/**'
      - 'packages/core/src/residence/pipelineDragRules.ts'
      - 'vitest.config.ts'
      - '.github/workflows/rpa-transaction-test-coverage.yml'
  push:
    branches:
      - main
      - 'automation/**'
      - 'feature/**'
    paths:
      - 'src/config/pipelineStages.ts'
      - 'packages/core/src/transaction/**'

jobs:
  rpa-transaction-tests:
    name: Kanban + délais PA (blocage si échec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests RPA — resolveColumnId 100% + 7 délais PA acceptée
        run: npm run test:rpa-coverage
